name: Build caddy-cloudflare

on:
  pull_request:
    paths: ['.github/workflows/build-caddy-cloudflare.yml', 'caddy-cloudflare/**']
  push:
    branches: [main]
    paths: ['.github/workflows/build-caddy-cloudflare.yml', 'caddy-cloudflare/**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=docker depName=caddy
      CADDY_VERSION: "2.11.2"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push caddy-cloudflare
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: caddy-cloudflare
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/bl4ko/caddy-cloudflare:latest
            ghcr.io/bl4ko/caddy-cloudflare:${{ env.CADDY_VERSION }}
          cache-from: type=gha,scope=caddy-cloudflare
          cache-to: type=gha,scope=caddy-cloudflare,mode=max
