name: Build happy-server

on:
  pull_request:
    paths: ['.github/workflows/build-happy-server.yml']
  push:
    branches: [main]
    paths: ['.github/workflows/build-happy-server.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone upstream happy (latest main)
        run: git clone --depth 1 https://github.com/slopus/happy.git happy

      - name: Set version from upstream commit
        id: version
        run: echo "sha=$(cd happy && git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Patch Dockerfile to copy patches directory
        run: sed -i '/^COPY scripts .\/scripts$/a COPY patches ./patches' happy/Dockerfile

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push happy-server (standalone)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: happy
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/bl4ko/happy-server:latest
            ghcr.io/bl4ko/happy-server:${{ steps.version.outputs.sha }}
          cache-from: type=gha,scope=happy-server
          cache-to: type=gha,scope=happy-server,mode=max
