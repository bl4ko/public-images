name: Build paperless-ngx

on:
  pull_request:
    paths: ['.github/workflows/build-paperless-ngx.yml', 'paperless-ngx/**']
  push:
    branches: [main]
    paths: ['.github/workflows/build-paperless-ngx.yml', 'paperless-ngx/**']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=docker depName=ghcr.io/paperless-ngx/paperless-ngx
      PAPERLESS_VERSION: "2.20.13"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push paperless-ngx
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: paperless-ngx
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/bl4ko/paperless-ngx:latest
            ghcr.io/bl4ko/paperless-ngx:${{ env.PAPERLESS_VERSION }}
          cache-from: type=gha,scope=paperless-ngx
          cache-to: type=gha,scope=paperless-ngx,mode=max
