name: Build zeroclaw

on:
  pull_request:
    paths: ['.github/workflows/build-zeroclaw.yml']
  push:
    branches: [main]
    paths: ['.github/workflows/build-zeroclaw.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=github-releases depName=zeroclaw-labs/zeroclaw
      ZEROCLAW_VERSION: v0.6.8
    steps:
      - name: Clone upstream zeroclaw
        run: |
          git clone --depth 1 --branch "$ZEROCLAW_VERSION" \
            https://github.com/zeroclaw-labs/zeroclaw.git zeroclaw

      - name: Patch workspace for Docker build
        run: |
          # apps/tauri is in .dockerignore but listed as a workspace member,
          # causing "failed to load manifest" errors during Docker build.
          # Remove it from workspace and regenerate lockfile.
          cd zeroclaw
          sed -i 's|members = \[".", "crates/robot-kit", "crates/aardvark-sys", "apps/tauri"\]|members = [".", "crates/robot-kit", "crates/aardvark-sys"]|' Cargo.toml
          sed -i 's/cargo build --release --locked/cargo build --release/g' Dockerfile

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push zeroclaw
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: zeroclaw
          target: release
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/bl4ko/zeroclaw:latest
            ghcr.io/bl4ko/zeroclaw:${{ env.ZEROCLAW_VERSION }}
          cache-from: type=gha,scope=zeroclaw
          cache-to: type=gha,scope=zeroclaw,mode=max
