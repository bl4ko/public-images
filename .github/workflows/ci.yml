name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-zeroclaw:
    runs-on: ubuntu-latest
    env:
      # renovate: datasource=github-releases depName=zeroclaw-labs/zeroclaw
      ZEROCLAW_VERSION: v0.1.7
    steps:
      - name: Clone upstream zeroclaw
        run: |
          git clone --depth 1 --branch "$ZEROCLAW_VERSION" \
            https://github.com/zeroclaw-labs/zeroclaw.git zeroclaw

      - name: Patch Dockerfile for postgres feature
        run: |
          sed -i 's/cargo build --release --locked/cargo build --release --locked --features memory-postgres/g' zeroclaw/Dockerfile

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push zeroclaw
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: zeroclaw
          target: release
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/bl4ko/zeroclaw:latest
            ghcr.io/bl4ko/zeroclaw:${{ env.ZEROCLAW_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  gitleaks:
    uses: bl4ko/shared-actions/.github/workflows/gitleaks.yml@main
